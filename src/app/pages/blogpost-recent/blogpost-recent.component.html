<div class="right-widget recent-post">
    <h3>Recent Blogs</h3>
    <div *ngFor="let blog of blogs | slice:0:4 " class="mt-1">
        <a [routerLink]="['/blog', blog.id]">
            <div class="rb-box">
                <div class="rb-box-img">
                    <img src="{{blog.image}}" alt="{{blog.title}}" />
                </div>
                <div class="rb-box-desc">
                    <h6>{{blog.title}}</h6>
                    <p>Posted On: {{blog.created_at | date:'mediumDate'}}</p>
                </div>
            </div>
        </a>
        <hr>
    </div>
</div>
